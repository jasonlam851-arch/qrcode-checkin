<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動二維碼簽到系統</title>
    <!-- 引入 QR Code 生成與掃描的開源庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        h2 { text-align: center; margin-top: 0; color: #1e3a8a; }
        .tab-buttons {
            display: flex;
            background: #e2e8f0;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #ffffff;
            color: #1e3a8a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* 帳號區域樣式 */
        select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }
        .user-info { text-align: center; font-weight: bold; font-size: 18px; }

        /* 管理員區域樣式 */
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: none !important;
        }
        .log-list {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }
        .log-list li {
            background: #ecfdf5;
            color: #065f46;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid #34d399;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頁籤切換：模擬用戶端與管理員端 -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('user')">每人專屬 QR Code</button>
            <button class="tab-btn" onclick="switchTab('admin')">管理員掃描簽到</button>
        </div>

        <!-- 1. 使用者面板（顯示專屬二維碼） -->
        <div id="userPanel" class="panel active">
            <h2>我的簽到 QR Code</h2>
            <label for="userSelect">切換測試帳號：</label>
            <select id="userSelect" onchange="generateUserQRCode()">
                <option value="USER_001">張小明 (ID: USER_001)</option>
                <option value="USER_002">李美玲 (ID: USER_002)</option>
                <option value="USER_003">王大同 (ID: USER_003)</option>
            </select>
            <div id="qrcode"></div>
            <div class="user-info" id="userInfo"></div>
        </div>

        <!-- 2. 管理員面板（掃描與簽到紀錄） -->
        <div id="adminPanel" class="panel">
            <h2>管理員掃描端</h2>
            <!-- 相機畫面渲染區域 -->
            <div id="reader"></div>
            
            <h3 style="margin-top: 25px;">今日簽到成功紀錄：</h3>
            <ul class="log-list" id="logList">
                <!-- 簽到成功會被塞到這裡 -->
            </ul>
        </div>
    </div>

    <script>
        // --- 全域模擬資料庫 ---
        // 帳號對應的真實姓名
        const userDatabase = {
            "USER_001": "張小明",
            "USER_002": "李美玲",
            "USER_003": "王大同"
        };
        // 儲存已簽到帳號（防止重複簽到）
        let checkedInUsers = new Set();
        
        let qrCodeInstance = null;
        let html5QrcodeScanner = null;

        // --- 頁籤切換邏輯 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'user') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('userPanel').classList.add('active');
                // 停止相機以節省效能
                if (html5QrcodeScanner) { html5QrcodeScanner.clear(); }
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('adminPanel').classList.add('active');
                // 切換到管理員時，開啟相機掃描
                startScanner();
            }
        }

        // --- 使用者端：生成專屬二維碼 ---
        function generateUserQRCode() {
            const userId = document.getElementById('userSelect').value;
            const userName = userDatabase[userId];
            
            document.getElementById('userInfo').innerText = `${userName} 的二維碼`;
            document.getElementById('qrcode').innerHTML = ""; // 清空舊的
            
            // 實務上，二維碼內容通常放一串加密 Token、網址或是「純用戶 ID」
            // 這裡直接將用戶 ID 當作二維碼內容
            qrCodeInstance = new QRCode(document.getElementById("qrcode"), {
                text: userId,
                width: 200,
                height: 200,
                colorDark : "#1e3a8a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // --- 管理員端：掃描二維碼與簽到處理 ---
        function startScanner() {
            // 避免重複初始化
            if (html5QrcodeScanner) { html5QrcodeScanner.clear(); }

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: { width: 250, height: 250 } 
            }, false);
            
            // 掃描成功的回呼函式 (Callback)
            function onScanSuccess(decodedText, decodedResult) {
                // decodedText 就是二維碼裡面的內容 (例如: "USER_001")
                handleCheckIn(decodedText);
            }

            html5QrcodeScanner.render(onScanSuccess);
        }

        function handleCheckIn(userId) {
            // 檢查這個 ID 是否在我們的員工/會員名單中
            if (userDatabase[userId]) {
                const userName = userDatabase[userId];
                
                // 檢查是否重複簽到
                if (checkedInUsers.has(userId)) {
                    alert(`${userName} 已經簽到過了，請勿重複掃描！`);
                    return;
                }

                // 簽到成功，寫入紀錄
                checkedInUsers.add(userId);
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                
                const logList = document.getElementById('logList');
                const li = document.createElement('li');
                li.innerText = `[${timeStr}] 🟢 ${userName} (${userId}) 簽到成功！`;
                logList.prepend(li); // 新紀錄排在最上面
                
                // 播放一個簡單的成功提示音或提示
                alert(`✨ 簽到成功：${userName}`);
            } else {
                alert(`⚠️ 錯誤：讀取到未知的二維碼數據 (${userId})`);
            }
        }

        // 網頁載入時，預設先幫第一個使用者生出二維碼
        window.onload = function() {
            generateUserQRCode();
        };
    </script>
</body>
</html>

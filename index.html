<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>挺豪餐廳 - 智能隨身系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; text-align: center; }
        .brand { font-size: 2.2rem; font-weight: 700; color: #d4af37; letter-spacing: 4px; margin: 20px 0; }
        .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        /* 階段一：選擇人數 */
        #selectPhase { display: block; }
        .info-header { font-size: 1.1rem; color: #a0aec0; margin-bottom: 30px; letter-spacing: 2px; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }
        .num-btn { background: #262626; border: 1px solid #3d3d3d; color: white; font-size: 1.8rem; height: 65px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .num-btn:active { background: #d4af37; color: #121212; }

        /* 階段二：排隊中 + 專屬二維碼 */
        #queuePhase { display: none; }
        .ticket-label { font-size: 1rem; color: #a0aec0; letter-spacing: 1px; }
        .ticket-num { font-size: 4.5rem; font-weight: 700; color: #ffffff; margin: 10px 0; font-family: monospace; }
        #qrcode { display: inline-block; background: white; padding: 12px; border-radius: 12px; margin: 15px 0; }
        
        /* 階段三：已用餐 + 1小時30分鐘倒數 */
        #diningPhase { display: none; }
        .dining-status { font-size: 2rem; font-weight: bold; color: #e53e3e; letter-spacing: 2px; margin-bottom: 5px; }
        .countdown { font-size: 5rem; font-weight: 700; color: #ffffff; font-family: monospace; margin: 20px 0; text-shadow: 0 0 15px rgba(229,62,62,0.4); }

        .footer-tip { font-size: 0.9rem; color: #555; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="brand">挺豪餐廳</div>

    <div class="card">
        <div id="selectPhase">
            <div class="info-header">歡迎光臨，請選擇到訪人數</div>
            <div class="num-grid">
                <button class="num-btn" onclick="takeTicket(1)">1</button>
                <button class="num-btn" onclick="takeTicket(2)">2</button>
                <button class="num-btn" onclick="takeTicket(3)">3</button>
                <button class="num-btn" onclick="takeTicket(4)">4</button>
                <button class="num-btn" onclick="takeTicket(5)">5</button>
            </div>
            <div class="footer-tip">1人:A組 | 2-3人:B組 | 4-5人:C組</div>
        </div>

        <div id="queuePhase">
            <div class="ticket-label">您的排隊號碼</div>
            <div class="ticket-num" id="queueNumDisplay">A---</div>
            <hr style="border: 0; border-top: 1px dashed #333; margin: 15px 0;">
            <div class="ticket-label" style="color: #d4af37;">請向店員出示此專屬二維碼入座</div>
            
            <div id="qrcode"></div>
            
            <div class="footer-tip">當大屏幕叫到您的號碼時，請前來櫃檯由店員掃描此二維碼安排入座。</div>
        </div>

        <div id="diningPhase">
            <div class="dining-status">已用餐</div>
            <div style="color: #a0aec0; font-size: 1rem;">限時：1 小時 30 分鐘</div>
            <div class="countdown" id="timerDisplay">90:00</div>
            <div class="footer-tip" style="color: #718096;">
                請盡情享受您的美食。<br>
                離店時請配合店員再次掃碼重置，或時限到期後網頁會自動清空。
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, runTransaction, set } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDwUF4-rBRG9QGyti2_Smx_PRZ8sZOZL0A",
            authDomain: "my-queue-system-3bcc5.firebaseapp.com",
            databaseURL: "https://my-queue-system-3bcc5-default-rtdb.firebaseio.com",
            projectId: "my-queue-system-3bcc5",
            storageBucket: "my-queue-system-3bcc5.firebasestorage.app",
            messagingSenderId: "32354532851",
            appId: "1:32354532851:web:4ba48fcc31bb454399a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 建立或讀取本手機唯一的識別碼 UID
        let myUID = localStorage.getItem('t_restaurant_combination_uid');
        if (!myUID) {
            myUID = 'USER_' + Date.now() + Math.floor(Math.random() * 1000);
            localStorage.setItem('t_restaurant_combination_uid', myUID);
        }

        let qrcodeObj = null;
        let timerInterval = null;
        let localTicketNumber = localStorage.getItem('t_restaurant_saved_ticket'); // 緩存號碼

        // 初始化檢查
        const myNodeRef = ref(db, `comboSystem/${myUID}`);
        
        // 監聽此 UID 的雲端狀態變化
        onValue(myNodeRef, (snapshot) => {
            const data = snapshot.val();
            
            if (!data) {
                // 雲端無資料（待機狀態或已被店員重置離開）
                clearInterval(timerInterval);
                localStorage.removeItem('t_restaurant_saved_ticket');
                localTicketNumber = null;
                
                document.getElementById('selectPhase').style.display = 'block';
                document.getElementById('queuePhase').style.display = 'none';
                document.getElementById('diningPhase').style.display = 'none';
            } 
            else if (data.status === "waiting") {
                // 已選人數排隊中，顯示專屬 QR 碼
                document.getElementById('selectPhase').style.display = 'none';
                document.getElementById('queuePhase').style.display = 'block';
                document.getElementById('diningPhase').style.display = 'none';
                
                document.getElementById('queueNumDisplay').innerText = data.ticketNumber;
                
                // 繪製或更新二維碼（內含我們的 UID）
                if (!qrcodeObj) {
                    qrcodeObj = new QRCode(document.getElementById("qrcode"), {
                        text: myUID, width: 180, height: 180
                    });
                }
            } 
            else if (data.status === "dining") {
                // 店員已掃描並點擊確認入座 ➡️ 進入用餐倒數
                document.getElementById('selectPhase').style.display = 'none';
                document.getElementById('queuePhase').style.display = 'none';
                document.getElementById('diningPhase').style.display = 'block';
                
                startCountdown(data.startTime);
            }
        });

        // 選擇人數、獲取號碼、並在雲端綁定 UID 
        window.takeTicket = function(guests) {
            let type = 'A';
            if (guests === 1) type = 'A';
            else if (guests === 2 || guests === 3) type = 'B';
            else if (guests === 4 || guests === 5) type = 'C';

            // 先去傳統叫號庫獲取組別最新號碼
            const totalRef = ref(db, `queueSystem/${type}/totalIssued`);
            runTransaction(totalRef, (current) => {
                return (current || 0) + 1;
            }).then((result) => {
                if (result.committed) {
                    const num = result.snapshot.val();
                    const formattedNum = type + String(num).padStart(3, '0');
                    
                    localStorage.setItem('t_restaurant_saved_ticket', formattedNum);
                    
                    // 將狀態與號碼綁定推送到新系統 `comboSystem/${myUID}`
                    set(myNodeRef, {
                        status: "waiting",
                        ticketNumber: formattedNum,
                        guestsCount: guests
                    });
                }
            });
        };

        // 1小時30分鐘倒數計時核心（90分鐘 = 5400秒）
        function startCountdown(startTime) {
            clearInterval(timerInterval);
            const totalLimitSeconds = 90 * 60;

            timerInterval = setInterval(() => {
                const now = Date.now();
                const elapsed = Math.floor((now - startTime) / 1000);
                const remaining = totalLimitSeconds - elapsed;

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    set(myNodeRef, null); // 時間到，自動刪除資料，兩端重置回到人數選擇
                } else {
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    document.getElementById('timerDisplay').innerText = 
                        String(mins).padStart(2, '0') + ":" + String(secs).padStart(2, '0');
                }
            }, 1000);
        }
    </script>
</body>
</html>

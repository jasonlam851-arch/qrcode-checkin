<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google 試算表聯動簽到系統</title>
    <!-- 引入專業庫：ZXing(高效掃描), QRCode(生成) -->
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary: #107c41; --bg: #f3f4f6; --card-bg: #ffffff; --text: #1f2937; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 460px; background: var(--card-bg); border-radius: 24px; padding: 25px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .nav-tabs { display: flex; background: #e5e7eb; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #4b5563; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(16,124,65,0.2); }
        .panel { display: none; } .panel.active { display: block; }
        
        select { width: 100%; padding: 12px; background: #f9fafb; border: 1px solid #d1d5db; color: var(--text); border-radius: 10px; font-size: 16px; margin-bottom: 15px; }
        .qr-box { background: white; padding: 15px; border-radius: 12px; display: inline-block; margin: 10px 0; border: 1px solid #e5e7eb; }
        
        /* 手機管理員端 (強制後置鏡頭) */
        .scanner-view { position: relative; width: 100%; padding-top: 100%; background: #000; border-radius: 14px; overflow: hidden; }
        #preview { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; box-shadow: inset 0 0 0 40px rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .box { width: 65%; height: 65%; border: 2px dashed #107c41; position: relative; }
        .laser { position: absolute; width: 100%; height: 2px; background: #107c41; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 8px #107c41; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        
        .loading { display: none; color: #107c41; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="switchMode('display')">👤 員工出示 QR Code</button>
            <button class="nav-btn" onclick="switchMode('scanner')">📷 管理員手機掃描</button>
        </div>

        <!-- 面板 A：員工端（生成含有 ID 的 QR Code） -->
        <div id="displayPanel" class="panel active">
            <h3 style="color: #107c41;">請選擇您的身分</h3>
            <select id="userSelect" onchange="generateUserQR()">
                <option value="EMP_001">張小明 (EMP_001)</option>
                <option value="EMP_002">李美玲 (EMP_002)</option>
                <option value="EMP_003">王大同 (EMP_003)</option>
            </select>
            <div class="qr-box"><div id="qrcode"></div></div>
            <p style="color: #6b7280; font-size: 13px;">管理員掃描後，數據將即時寫入 Google Excel</p>
        </div>

        <!-- 面板 B：管理員端 -->
        <div id="scannerPanel" class="panel">
            <h3 style="color: #107c41;">管理員掃描端 (已鎖定後鏡頭)</h3>
            <div class="scanner-view">
                <video id="preview"></video>
                <div class="overlay"><div class="box"><div class="laser"></div></div></div>
            </div>
            <div id="loadingStatus" class="loading">⏳ 正在同步寫入 Google 試算表...</div>
        </div>
    </div>

    <script>
        // 內部員工名冊對照表
        const employees = {
            "EMP_001": "張小明",
            "EMP_002": "李美玲",
            "EMP_003": "王大同"
        };

        // 📌 已經為您填入您的 Google GAS 專屬網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyM4gOAFtIAW3ihSjdL-Q9vfZEAJECvAE3CjQ8P5tK9yEKoTTcqOPrUwh0yFMv-JZh9AQ/exec";

        let codeReader = null;
        let isSending = false; 

        function switchMode(mode) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            if (mode === 'display') {
                document.querySelectorAll('.nav-btn')[0].classList.add('active');
                document.getElementById('displayPanel').classList.add('active');
                if (codeReader) { codeReader.reset(); codeReader = null; }
            } else {
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
                document.getElementById('scannerPanel').classList.add('active');
                startRearScanner(); 
            }
        }

        // 生成 QR Code
        function generateUserQR() {
            const empId = document.getElementById('userSelect').value;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: empId,
                width: 200,
                height: 200,
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // 啟動專門鎖定「後置主鏡頭」的掃描器
        async function startRearScanner() {
            codeReader = new ZXing.BrowserQRCodeReader();
            try {
                const videoDevices = await codeReader.getVideoInputDevices();
                if (videoDevices.length === 0) { alert("找不到相機"); return; }

                // 強制挑選後鏡頭
                let rearCameraId = videoDevices[videoDevices.length - 1].deviceId;
                for (const device of videoDevices) {
                    const label = device.label.toLowerCase();
                    if (label.includes('back') || label.includes('rear') || label.includes('後置') || label.includes('環境')) {
                        rearCameraId = device.deviceId;
                        break;
                    }
                }

                const constraints = {
                    video: {
                        deviceId: { exact: rearCameraId },
                        facingMode: "environment" 
                    }
                };

                codeReader.decodeFromConstraints(constraints, 'preview', (result, err) => {
                    if (result && !isSending) {
                        const scannedId = result.text;
                        if (employees[scannedId]) {
                            sendToGoogleSheets(scannedId, employees[scannedId]);
                        }
                    }
                });
            } catch (error) {
                console.error(error);
                codeReader.decodeFromVideoDevice(undefined, 'preview', (result) => {
                    if (result && employees[result.text] && !isSending) {
                        sendToGoogleSheets(result.text, employees[result.text]);
                    }
                });
            }
        }

        // 將數據發送到 Google Excel 試算表
        function sendToGoogleSheets(id, name) {
            isSending = true;
            document.getElementById('loadingStatus').style.display = 'block';

            if (navigator.vibrate) navigator.vibrate(100); 

            // 發送 POST 請求到 Google GAS
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: id, name: name })
            })
            .then(() => {
                document.getElementById('loadingStatus').style.display = 'none';
                alert(`🟢 簽到成功！\n姓名：${name}\n數據已成功寫入 Google Excel。`);
                
                // 延遲 2.5 秒解鎖，防止重刷
                setTimeout(() => { isSending = false; }, 2500);
            })
            .catch(err => {
                console.error(err);
                alert("寫入 Google 失敗，請檢查 GAS 網址與權限設定。");
                isSending = false;
                document.getElementById('loadingStatus').style.display = 'none';
            });
        }

        window.onload = generateUserQR;
    </script>
</body>
</html>

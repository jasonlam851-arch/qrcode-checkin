<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速智慧簽到系統</title>
    <!-- 🚀 引入高效能解碼庫 Html5Qrcode -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { 
            --primary: #1f2937; 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text: #0f172a; 
            --accent: #2563eb; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 16px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        
        .container { 
            width: 100%; 
            max-width: 440px; 
            background: var(--card-bg); 
            border-radius: 30px; 
            padding: 24px; 
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.04); 
            text-align: center; 
            position: relative;
        }
        
        .nav-tabs { 
            display: flex; 
            background: #f1f5f9; 
            padding: 4px; 
            border-radius: 14px; 
            margin-bottom: 24px; 
        }
        .nav-btn { 
            flex: 1; 
            border: none; 
            background: transparent; 
            color: #64748b; 
            padding: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 10px; 
            font-size: 14px; 
            transition: all 0.2s;
        }
        .nav-btn.active { 
            background: white; 
            color: var(--text); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.04); 
        }
        
        .panel { display: none; } 
        .panel.active { display: block; }
        
        h3 { font-size: 19px; font-weight: 700; margin: 0 0 6px 0; }
        p { color: #64748b; font-size: 13px; margin: 0 0 20px 0; }
        
        select { 
            width: 100%; 
            padding: 14px; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 16px; 
            margin-bottom: 16px; 
            outline: none;
        }
        
        .qr-box { 
            background: #f8fafc; 
            padding: 20px; 
            border-radius: 16px; 
            display: inline-block; 
            border: 1px solid #f1f5f9; 
        }
        
        /* 📷 舒適的掃描窗高度 */
        .scanner-view { 
            position: relative; 
            width: 100%; 
            padding-top: 85%; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
        }
        
        #preview { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover !important; 
        }
        #preview video { object-fit: cover !important; }
        
        .overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            pointer-events: none; 
            z-index: 10;
        }
        
        /* ✨ 完美比例的極簡圓角瞄準框 */
        .box { 
            width: 65%; 
            height: 75%; 
            border: 2px solid rgba(255, 255, 255, 0.85); 
            border-radius: 16px; 
            box-shadow: 0 0 0 500px rgba(0, 0, 0, 0.45); 
        }
        
        .loading { 
            display: none; 
            color: var(--accent); 
            font-weight: 600; 
            margin-top: 16px; 
            font-size: 14px;
        }
        
        /* 底部工具區與版本號碼 */
        .footer-info {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-btn {
            background: none; border: none; color: #94a3b8; font-size: 11px; cursor: pointer; text-decoration: underline; padding: 0;
        }
        .version-tag {
            font-size: 11px; color: #cbd5e1; font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="switchMode('display')">👤 員工 QR Code</button>
            <button class="nav-btn" onclick="switchMode('scanner')">📷 管理員掃描</button>
        </div>

        <!-- 面板 A -->
        <div id="displayPanel" class="panel active">
            <h3>請選擇您的身分</h3>
            <p>出示下方 QR Code 即可進行簽到</p>
            <select id="userSelect" onchange="generateUserQR()">
                <option value="EMP_001">張小明 (EMP_001)</option>
                <option value="EMP_002">李美玲 (EMP_002)</option>
                <option value="EMP_003">王大同 (EMP_003)</option>
            </select>
            <div class="qr-box"><div id="qrcode"></div></div>
        </div>

        <!-- 面板 B -->
        <div id="scannerPanel" class="panel">
            <h3>將二維碼放入框內</h3>
            <p>即時驗證：支援過濾無效碼與重複簽到</p>
            <div class="scanner-view">
                <div id="preview"></div>
                <div class="overlay">
                    <div class="box"></div>
                </div>
            </div>
            <div id="loadingStatus" class="loading">⏳ 正在同步寫入 Google Excel...</div>
            
            <div class="footer-info">
                <button class="clear-btn" onclick="clearRecords()">重置今日紀錄 (測試用)</button>
                <span class="version-tag">v2.2.0-Build2026</span>
            </div>
        </div>
    </div>

    <script>
        const employees = {
            "EMP_001": "張小明",
            "EMP_002": "李美玲",
            "EMP_003": "王大同"
        };

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyM4gOAFtIAW3ihSjdL-Q9vfZEAJECvAE3CjQ8P5tK9yEKoTTcqOPrUwh0yFMv-JZh9AQ/exec";

        let html5QrcodeScanner = null;
        let isProcessing = false;
        let isCameraChanging = false; // 🔒 新增：防止非同步切換相機衝突的安全鎖

        async function switchMode(mode) {
            if (isCameraChanging) return; // 如果相機還在開關中，直接無視惡意點擊
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            if (mode === 'display') {
                document.querySelectorAll('.nav-btn')[0].classList.add('active');
                document.getElementById('displayPanel').classList.add('active');
                await stopScanner();
            } else {
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
                document.getElementById('scannerPanel').classList.add('active');
                await startAdvancedScanner(); 
            }
        }

        function generateUserQR() {
            const empId = document.getElementById('userSelect').value;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: empId,
                width: 180,
                height: 180,
                colorDark : "#0f172a",
                colorLight : "#f8fafc",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        async function stopScanner() {
            isCameraChanging = true;
            try {
                if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
                    await html5QrcodeScanner.stop();
                }
            } catch (e) {
                console.error("關閉相機異常", e);
            } finally {
                html5QrcodeScanner = null;
                isProcessing = false;
                isCameraChanging = false;
                document.getElementById('loadingStatus').style.display = 'none';
            }
        }

        async function startAdvancedScanner() {
            if (html5QrcodeScanner) await stopScanner();
            
            isCameraChanging = true;
            html5QrcodeScanner = new Html5Qrcode("preview");
            
            const config = {
                fps: 25, 
                aspectRatio: 1.0,
                qrbox: function(vw, vh) {
                    const size = Math.min(vw, vh) * 0.65;
                    return { width: size, height: size };
                }
            };

            try {
                await html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    config,
                    onScanSuccess
                );
            } catch (err) {
                console.error(err);
                try {
                    await html5QrcodeScanner.start({ facingMode: "user" }, config, onScanSuccess);
                } catch(e) {
                    alert("無法啟動相機。");
                }
            } finally {
                isCameraChanging = false; // 相機開完，解鎖分頁按鈕
            }
        }

        function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true; 

            let checkedRecords = [];
            try {
                checkedRecords = JSON.parse(localStorage.getItem("checked_employees") || "[]");
            } catch (e) {
                console.error("讀取本地儲存失敗", e);
            }

            // 1. 驗證是否為無效二維碼
            if (!employees[decodedText]) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                
                setTimeout(() => {
                    alert(`❌ 該二維碼無效！\n\n內容："${decodedText}"\n非系統認證的員工工號。`);
                    isProcessing = false; 
                }, 100);
                return;
            }

            // 2. 驗證是否重複簽到
            if (checkedRecords.includes(decodedText)) {
                if (navigator.vibrate) navigator.vibrate([200]); 
                setTimeout(() => {
                    alert(`⚠️ 已簽到，掃描無效！\n\n【${employees[decodedText]}】今日已有簽到紀錄，請勿重複發送。`);
                    isProcessing = false; 
                }, 100);
                return;
            }

            // 3. 通過驗證，執行正確簽到
            sendToGoogleSheets(decodedText, employees[decodedText]);
        }

        function sendToGoogleSheets(id, name) {
            document.getElementById('loadingStatus').style.display = 'block';
            if (navigator.vibrate) navigator.vibrate(100); 

            const uploadUrl = `${GAS_URL}?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}`;

            fetch(uploadUrl, {
                method: "POST",
                mode: "no-cors" 
            })
            .then(() => {
                // 💡 體驗優化：先隱藏讀取字樣，並延遲 100ms 讓 UI 順利渲染隱藏後，才跳出 alert
                document.getElementById('loadingStatus').style.display = 'none';
                
                try {
                    let checkedRecords = JSON.parse(localStorage.getItem("checked_employees") || "[]");
                    checkedRecords.push(id);
                    localStorage.setItem("checked_employees", JSON.stringify(checkedRecords));
                } catch (e) {
                    console.error("寫入本地儲存失敗", e);
                }

                setTimeout(() => {
                    alert(`🟢 簽到成功！\n姓名：${name}\n數據已成功寫入 Google 試算表。`);
                    isProcessing = false; 
                }, 100);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loadingStatus').style.display = 'none';
                setTimeout(() => {
                    alert("網路異常，寫入失敗。");
                    isProcessing = false; 
                }, 100);
            });
        }

        function clearRecords() {
            localStorage.removeItem("checked_employees");
            alert("🧹 紀錄已清除！可以重新測試重複簽到。");
        }

        window.onload = generateUserQR;
    </script>
</body>
</html>

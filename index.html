<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快掃式二維碼簽到系統</title>
    <!-- 引入高畫質 QR Code 生成庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }
        h2 { color: #0f172a; margin-top: 0; font-size: 24px; }
        select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            background-color: #f8fafc;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 25px 0;
            padding: 20px;
            background: #ffffff;
            border: 2px dashed #e2e8f0;
            border-radius: 16px;
        }
        .user-title { font-weight: bold; font-size: 20px; color: #2563eb; margin-bottom: 5px; }
        .hint { color: #64748b; font-size: 14px; margin-bottom: 20px; }
        
        /* 簽到結果彈窗樣式 */
        .result-box {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 標題會根據模式自動切換 -->
        <h2 id="mainTitle">專屬簽到 QR Code</h2>
        
        <!-- 模式一：一般使用者畫面（顯示 QR Code） -->
        <div id="userSection">
            <label for="userSelect">切換測試帳號：</label>
            <select id="userSelect" onchange="generateSignUrl()">
                <option value="USER_001">張小明 (ID: USER_001)</option>
                <option value="USER_002">李美玲 (ID: USER_002)</option>
                <option value="USER_003">王大同 (ID: USER_003)</option>
            </select>
            
            <div id="qrcode"></div>
            <div class="user-title" id="userNameDisplay"></div>
            <p class="hint">請管理員直接用「手機相機」或「LINE」掃描此碼完成簽到</p>
        </div>

        <!-- 模式二：管理員掃描後跳轉的結果畫面 -->
        <div id="resultSection" class="result-box success">
            <span id="resultMessage"></span>
        </div>
    </div>

    <script>
        // 模擬名冊
        const userDatabase = {
            "USER_001": "張小明",
            "USER_002": "李美玲",
            "USER_003": "王大同"
        };

        // 獲取目前網頁的基礎網址 (自動適應你的 GitHub Pages 網址)
        const baseUrl = window.location.origin + window.location.pathname;

        // 1. 【使用者端】生成內嵌網址的二維碼
        function generateSignUrl() {
            const userId = document.getElementById('userSelect').value;
            const userName = userDatabase[userId];
            
            document.getElementById('userNameDisplay').innerText = userName;
            document.getElementById('qrcode').innerHTML = ""; // 刷新清空
            
            // 關鍵：將簽到邏輯做成網址參數 (?checkin=用戶ID)
            const targetUrl = `${baseUrl}?checkin=${userId}`;
            
            // 生成高容錯率(H)的二維碼，更好掃
            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: 220,
                height: 220,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // 2. 【管理員端】檢查網址裡面有沒有被掃碼帶入的參數
        function checkUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('checkin'); // 獲取 ?checkin= 後面的字串

            if (userId) {
                // 如果網址有參數，代表這是管理員「掃碼後跳進來的」
                document.getElementById('userSection').style.display = 'none'; // 隱藏原本的QR碼畫面
                document.getElementById('resultSection').style.display = 'block'; // 顯示結果
                document.getElementById('mainTitle').innerText = '簽到結果報告';

                if (userDatabase[userId]) {
                    const userName = userDatabase[userId];
                    const now = new Date();
                    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                    
                    // 顯示簽到成功
                    document.getElementById('resultMessage').innerHTML = `
                        <span style="font-size: 50px;">🟢</span><br><br>
                        ${userName} (${userId})<br>
                        於 ${timeStr} 簽到成功！
                    `;
                } else {
                    // 錯誤代碼
                    document.getElementById('resultSection').className = 'result-box';
                    document.getElementById('resultSection').style.backgroundColor = '#fee2e2';
                    document.getElementById('resultSection').style.color = '#991b1b';
                    document.getElementById('resultMessage').innerHTML = `❌ 錯誤：此二維碼無效或帳號不存在。`;
                }
            } else {
                // 如果是一般打開網頁，就正常顯示 QR Code 供人掃描
                generateSignUrl();
            }
        }

        // 初始化執行
        window.onload = checkUrlParameters;
    </script>
</body>
</html>

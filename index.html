<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad 取號機</title>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f7fafc; padding: 40px; text-align: center; }
        h1 { color: #2d3748; font-size: 2.5rem; margin-bottom: 10px; }
        .sub-title { color: #718096; font-size: 1.2rem; margin-bottom: 40px; }
        .btn-group { display: flex; flex-direction: column; gap: 25px; max-width: 500px; margin: 0 auto; }
        button { padding: 25px; font-size: 1.8rem; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; color: white; transition: transform 0.1s; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.95); }
        .btn-a { background-color: #3182ce; }
        .btn-b { background-color: #dd6b20; }
        .btn-c { background-color: #38a169; }
        .ticket-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 80%; max-width: 400px; }
        .ticket-num { font-size: 4.5rem; font-weight: bold; color: #2d3748; margin: 20px 0; }
    </style>
</head>
<body>

    <h1>歡迎光臨</h1>
    <div class="sub-title">請選擇人數取號排隊</div>

    <div class="btn-group">
        <button class="btn-a" onclick="takeTicket('A')">🧍 1人 (A組)</button>
        <button class="btn-b" onclick="takeTicket('B')">👨‍👦 2 - 3人 (B組)</button>
        <button class="btn-c" onclick="takeTicket('C')">👨‍👩‍👧‍👦 4 - 5人 (C組)</button>
    </div>

    <div class="ticket-popup" id="popup">
        <div style="font-size: 1.5rem; color: #4a5568;">您的號碼是</div>
        <div class="ticket-num" id="displayNum">A001</div>
        <div style="color: #a0aec0; font-size: 1.1rem;">請截圖或記下號碼，等待叫號</div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, runTransaction } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDwUF4-rBRG9QGyti2_Smx_PRZ8sZOZL0A",
            authDomain: "my-queue-system-3bcc5.firebaseapp.com",
            databaseURL: "https://my-queue-system-3bcc5-default-rtdb.firebaseio.com",
            projectId: "my-queue-system-3bcc5",
            storageBucket: "my-queue-system-3bcc5.firebasestorage.app",
            messagingSenderId: "32354532851",
            appId: "1:32354532851:web:4ba48fcc31bb454399a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.takeTicket = function(type) {
            const totalRef = ref(db, `queueSystem/${type}/totalIssued`);
            runTransaction(totalRef, (current) => {
                return (current || 0) + 1;
            }).then((result) => {
                if (result.committed) {
                    const num = result.snapshot.val();
                    // 格式化號碼成 A001 格式
                    const formattedNum = type + String(num).padStart(3, '0');
                    
                    // 顯示彈窗
                    const popup = document.getElementById('popup');
                    document.getElementById('displayNum').innerText = formattedNum;
                    popup.style.display = 'block';
                    
                    // 3秒後自動關閉彈窗
                    setTimeout(() => { popup.style.display = 'none'; }, 3000);
                }
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聯動簽到系統</title>
    <!-- 引入專業庫：ZXing(高效掃描), QRCode(生成) -->
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { 
            --primary: #1f2937; /* 改為更有質感的深邃灰黑色 */
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text: #0f172a; 
            --accent: #3b82f6; /* 精緻的科技藍作為亮點 */
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        
        .container { 
            width: 100%; 
            max-width: 440px; 
            background: var(--card-bg); 
            border-radius: 28px; 
            padding: 30px 24px; 
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.06); 
            text-align: center; 
        }
        
        /* 導覽頁籤美化：現代膠囊風格 */
        .nav-tabs { 
            display: flex; 
            background: #f1f5f9; 
            padding: 6px; 
            border-radius: 16px; 
            margin-bottom: 28px; 
        }
        .nav-btn { 
            flex: 1; 
            border: none; 
            background: transparent; 
            color: #64748b; 
            padding: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 12px; 
            font-size: 14px; 
            transition: all 0.25s ease;
        }
        .nav-btn.active { 
            background: white; 
            color: var(--text); 
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05); 
        }
        
        .panel { display: none; } 
        .panel.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        h3 { font-size: 20px; font-weight: 700; margin-top: 0; margin-bottom: 8px; color: var(--text); }
        p { color: #64748b; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        
        select { 
            width: 100%; 
            padding: 14px; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            color: var(--text); 
            border-radius: 14px; 
            font-size: 16px; 
            margin-bottom: 20px; 
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
        }
        
        .qr-box { 
            background: #f8fafc; 
            padding: 24px; 
            border-radius: 20px; 
            display: inline-block; 
            margin-bottom: 10px; 
            border: 1px solid #f1f5f9; 
        }
        
        /* ✨ 精緻高級感掃描端介面 */
        .scanner-view { 
            position: relative; 
            width: 100%; 
            padding-top: 100%; /* 1:1 正方形 */
            background: #090d16; 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }
        
        #preview { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        /* 高質感半透明黑遮罩 */
        .overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(9, 13, 22, 0.65); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            pointer-events: none; 
        }
        
        /* 聚焦掃描框：剔除雜亂綠色，改用極簡幾何線條 */
        .box { 
            width: 65%; 
            height: 65%; 
            position: relative; 
            background: transparent;
            box-shadow: 0 0 0 1000px rgba(9, 13, 22, 0.65); /* 挖空中央效果 */
            border-radius: 20px;
            /* 柔和的白色中心框 */
            border: 1px solid rgba(255, 255, 255, 0.25);
            /* 呼吸動態光暈，取代舊式雷射線 */
            animation: breathe 2.5s infinite ease-in-out;
        }
        
        /* 四個角落的高級質感白色邊角邊框 */
        .box::before, .box::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            pointer-events: none;
        }
        
        /* 左上與右下角 */
        .box::before {
            top: -2px; left: -2px;
            border-right: none; border-bottom: none;
            border-top-left-radius: 12px;
        }
        /* 右上與左下角 */
        .box::after {
            top: -2px; right: -2px;
            border-left: none; border-bottom: none;
            border-top-right-radius: 12px;
        }
        
        /* 為另外兩個角手動補齊結構 */
        .box-corners {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
        }
        .box-corners::before, .box-corners::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
        }
        .box-corners::before {
            bottom: -2px; left: -2px;
            border-right: none; border-top: none;
            border-bottom-left-radius: 12px;
        }
        .box-corners::after {
            bottom: -2px; right: -2px;
            border-left: none; border-top: none;
            border-bottom-right-radius: 12px;
        }

        /* 呼吸光暈動畫：優雅不刺眼 */
        @keyframes breathe {
            0% { box-shadow: 0 0 0 1000px rgba(9, 13, 22, 0.65), inset 0 0 15px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 0 1000px rgba(9, 13, 22, 0.65), inset 0 0 30px rgba(59,130,246,0.3); border-color: rgba(255,255,255,0.5); }
            100% { box-shadow: 0 0 0 1000px rgba(9, 13, 22, 0.65), inset 0 0 15px rgba(255,255,255,0.1); }
        }
        
        .loading { 
            display: none; 
            color: var(--accent); 
            font-weight: 600; 
            margin-top: 16px; 
            font-size: 14px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="switchMode('display')">👤 員工 QR Code</button>
            <button class="nav-btn" onclick="switchMode('scanner')">📷 管理員掃描</button>
        </div>

        <!-- 面板 A：員工端 -->
        <div id="displayPanel" class="panel active">
            <h3>請選擇您的身分</h3>
            <p>出示下方 QR Code 即可進行簽到</p>
            <select id="userSelect" onchange="generateUserQR()">
                <option value="EMP_001">張小明 (EMP_001)</option>
                <option value="EMP_002">李美玲 (EMP_002)</option>
                <option value="EMP_003">王大同 (EMP_003)</option>
            </select>
            <div class="qr-box"><div id="qrcode"></div></div>
        </div>

        <!-- 面板 B：管理員端 -->
        <div id="scannerPanel" class="panel">
            <h3>對準 QR Code 進行掃描</h3>
            <p>系統將自動偵測並即時寫入 Excel</p>
            <div class="scanner-view">
                <video id="preview"></video>
                <div class="overlay">
                    <div class="box">
                        <div class="box-corners"></div>
                    </div>
                </div>
            </div>
            <div id="loadingStatus" class="loading">⏳ 正在即時寫入 Google 試算表...</div>
        </div>
    </div>

    <script>
        const employees = {
            "EMP_001": "張小明",
            "EMP_002": "李美玲",
            "EMP_003": "王大同"
        };

        // 📌 您的 Google GAS 專屬網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyM4gOAFtIAW3ihSjdL-Q9vfZEAJECvAE3CjQ8P5tK9yEKoTTcqOPrUwh0yFMv-JZh9AQ/exec";

        let codeReader = null;
        let isSending = false; 
        let currentCameraId = null;

        function switchMode(mode) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            if (mode === 'display') {
                document.querySelectorAll('.nav-btn')[0].classList.add('active');
                document.getElementById('displayPanel').classList.add('active');
                stopScanner();
            } else {
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
                document.getElementById('scannerPanel').classList.add('active');
                startRearScanner(); 
            }
        }

        function generateUserQR() {
            const empId = document.getElementById('userSelect').value;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: empId,
                width: 180,
                height: 180,
                colorDark : "#0f172a",
                colorLight : "#f8fafc",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function stopScanner() {
            if (codeReader) {
                codeReader.reset();
                codeReader = null;
            }
            isSending = false;
            document.getElementById('loadingStatus').style.display = 'none';
        }

        async function startRearScanner() {
            if (codeReader) stopScanner(); 
            
            codeReader = new ZXing.BrowserQRCodeReader();
            try {
                const videoDevices = await codeReader.getVideoInputDevices();
                if (videoDevices.length === 0) { alert("找不到相機"); return; }

                currentCameraId = videoDevices[videoDevices.length - 1].deviceId;
                for (const device of videoDevices) {
                    const label = device.label.toLowerCase();
                    if (label.includes('back') || label.includes('rear') || label.includes('後置') || label.includes('環境')) {
                        currentCameraId = device.deviceId;
                        break;
                    }
                }

                const constraints = {
                    video: {
                        deviceId: { exact: currentCameraId },
                        facingMode: "environment" 
                    }
                };

                decodeContinuously(constraints);
            } catch (error) {
                console.error(error);
                decodeContinuously(undefined);
            }
        }

        function decodeContinuously(constraints) {
            if (!codeReader) return;
            
            codeReader.decodeFromConstraints(constraints, 'preview', (result, err) => {
                if (result && !isSending) {
                    const scannedId = result.text;
                    if (employees[scannedId]) {
                        isSending = true; 
                        if (codeReader) codeReader.reset(); 
                        sendToGoogleSheets(scannedId, employees[scannedId]);
                    }
                }
                if (err && !(err instanceof ZXing.NotFoundException)) {
                    console.log("ZXing error ignored");
                }
            });
        }

        function sendToGoogleSheets(id, name) {
            document.getElementById('loadingStatus').style.display = 'block';
            if (navigator.vibrate) navigator.vibrate(100); 

            const uploadUrl = `${GAS_URL}?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}`;

            fetch(uploadUrl, {
                method: "POST",
                mode: "no-cors" 
            })
            .then(() => {
                document.getElementById('loadingStatus').style.display = 'none';
                
                setTimeout(() => {
                    alert(`🟢 簽到成功！\n姓名：${name}\n數據已成功發送。`);
                    isSending = false;
                    startRearScanner(); 
                }, 100);
            })
            .catch(err => {
                console.error(err);
                alert("寫入 Google 失敗，請檢查網路或 GAS 權限。");
                isSending = false;
                startRearScanner();
            });
        }

        window.onload = generateUserQR;
    </script>
</body>
</html>

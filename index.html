<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>挺豪餐廳</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; text-align: center; }
        .brand { font-size: 2.2rem; font-weight: 700; color: #d4af37; letter-spacing: 4px; margin: 20px 0; }
        .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); position: relative; }
        
        #selectPhase { display: block; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .num-btn { background: #262626; border: 1px solid #3d3d3d; color: white; font-size: 1.8rem; height: 65px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        #qrContainer { display: none; }
        .ticket-num { font-size: 4.5rem; font-weight: 700; color: #ffffff; margin: 10px 0; font-family: monospace; }
        #qrcode { display: inline-block; background: white; padding: 12px; border-radius: 12px; margin: 15px 0; }
        
        .blink-red { animation: flashRed 0.5s infinite alternate; }
        @keyframes flashRed { from { background: #1a1a1a; } to { background: #741b1b; border-color: #e53e3e; } }
        .call-msg { display: none; color: #e53e3e; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }

        #countdownArea { display: none; margin-top: 10px; }
        .countdown { font-size: 3.5rem; font-weight: 700; color: #e53e3e; font-family: monospace; }

        #thanksPhase { display: none; }
        .thanks-txt { font-size: 1.8rem; font-weight: bold; color: #d4af37; margin: 40px 0; line-height: 1.6; }
        .footer-tip { font-size: 0.85rem; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="brand">挺豪餐廳</div>

    <div class="card" id="thanksPhase">
        <div class="thanks-txt">用餐完畢<br>期待你下一次的到來</div>
    </div>

    <div class="card" id="mainCard">
        <div id="selectPhase">
            <div style="font-size: 1.1rem; color: #a0aec0; margin-bottom: 30px;">歡迎光臨，請選擇到訪人數</div>
            <div class="num-grid">
                <button class="num-btn" onclick="takeTicket(1)">1</button>
                <button class="num-btn" onclick="takeTicket(2)">2</button>
                <button class="num-btn" onclick="takeTicket(3)">3</button>
                <button class="num-btn" onclick="takeTicket(4)">4</button>
                <button class="num-btn" onclick="takeTicket(5)">5</button>
            </div>
            <div class="footer-tip">1人:A組 | 2-3人:B組 | 4-5人:C組</div>
        </div>

        <div id="qrContainer">
            <div class="call-msg" id="callMsg">📢 請即前往櫃檯入座！</div>
            <div style="color: #a0aec0; font-size: 0.9rem;" id="stateLabel">您的排隊號碼</div>
            <div class="ticket-num" id="ticketDisplay">A---</div>
            
            <div id="qrcode"></div>
            
            <div id="countdownArea">
                <div style="color: #a0aec0; font-size: 0.9rem;">用餐剩餘時間 (限時1.5小時)</div>
                <div class="countdown" id="timerDisplay">90:00</div>
            </div>
            <div class="footer-tip" id="qrFooter">請向工作人員出示此二維碼。</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, runTransaction, set } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDwUF4-rBRG9QGyti2_Smx_PRZ8sZOZL0A",
            authDomain: "my-queue-system-3bcc5.firebaseapp.com",
            databaseURL: "https://my-queue-system-3bcc5-default-rtdb.firebaseio.com",
            projectId: "my-queue-system-3bcc5",
            storageBucket: "my-queue-system-3bcc5.firebasestorage.app",
            messagingSenderId: "32354532851",
            appId: "1:32354532851:web:4ba48fcc31bb454399a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myUID = localStorage.getItem('t_restaurant_combo_uid_v2');
        if (!myUID) {
            myUID = 'U_' + Date.now() + Math.floor(Math.random() * 100);
            localStorage.setItem('t_restaurant_combo_uid_v2', myUID);
        }

        let qrcodeObj = null;
        let timerInterval = null;
        let voiceInterval = null;
        let lastStatus = null;
        let serverOffset = 0; // 🔥 用於對齊雲端標準時差

        // 🟢 先精準估算手機與雲端伺服器的時差
        onValue(ref(db, ".info/serverTimeOffset"), (snapshot) => {
            serverOffset = snapshot.val() || 0;
        });

        const myNodeRef = ref(db, `comboSystem/${myUID}`);

        onValue(ref(db), (snapshot) => {
            const root = snapshot.val() || {};
            const data = root.comboSystem?.[myUID];
            const queueData = root.queueSystem || {};

            if (lastStatus === "dining" && !data) {
                lastStatus = null;
                clearInterval(timerInterval);
                showThanksPage();
                return;
            }

            if (!data) {
                lastStatus = null;
                document.getElementById('selectPhase').style.display = 'block';
                document.getElementById('qrContainer').style.display = 'none';
                document.getElementById('mainCard').classList.remove('blink-red');
                document.getElementById('callMsg').style.display = 'none';
                clearInterval(voiceInterval);
                return;
            }

            lastStatus = data.status;

            if (data.status === "waiting") {
                document.getElementById('selectPhase').style.display = 'none';
                document.getElementById('qrContainer').style.display = 'block';
                document.getElementById('countdownArea').style.display = 'none';
                document.getElementById('stateLabel').innerText = "您的排隊號碼";
                document.getElementById('ticketDisplay').innerText = data.ticketNumber;

                if (!qrcodeObj) qrcodeObj = new QRCode(document.getElementById("qrcode"), { text: myUID, width: 160, height: 160 });

                const myGroup = data.ticketNumber.substring(0, 1);
                const myNum = parseInt(data.ticketNumber.substring(1));
                const currentCalled = queueData[myGroup]?.currentCalled || 0;

                if (currentCalled === myNum) {
                    document.getElementById('mainCard').classList.add('blink-red');
                    document.getElementById('callMsg').style.display = 'block';
                    if (!voiceInterval) {
                        triggerPhoneVoice(myGroup, myNum);
                        voiceInterval = setInterval(() => triggerPhoneVoice(myGroup, myNum), 6000);
                    }
                } else {
                    document.getElementById('mainCard').classList.remove('blink-red');
                    document.getElementById('callMsg').style.display = 'none';
                    clearInterval(voiceInterval); voiceInterval = null;
                }
            } 
            else if (data.status === "dining") {
                clearInterval(voiceInterval); voiceInterval = null;
                document.getElementById('selectPhase').style.display = 'none';
                document.getElementById('qrContainer').style.display = 'block';
                document.getElementById('countdownArea').style.display = 'block';
                document.getElementById('mainCard').classList.remove('blink-red');
                document.getElementById('callMsg').style.display = 'none';
                
                document.getElementById('stateLabel').innerText = "用餐桌號識別碼 (二維碼常駐)";
                document.getElementById('ticketDisplay').innerText = data.ticketNumber;

                startSynchronizedClock(data.startTime);
            }
        });

        function triggerPhoneVoice(type, num) {
            if ('speechSynthesis' in window) {
                let groupStr = type === 'A' ? '一人 A' : type === 'B' ? '二至三人 B' : '四至五人 C';
                let ut = new SpeechSynthesisUtterance(`請 ${groupStr} ${num} 號前來櫃檯入座`);
                ut.lang = 'zh-HK'; window.speechSynthesis.speak(ut);
            }
        }

        window.takeTicket = function(guests) {
            let type = 'A';
            if (guests === 1) type = 'A';
            else if (guests === 2 || guests === 3) type = 'B';
            else if (guests === 4 || guests === 5) type = 'C';
            if ('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));

            const totalRef = ref(db, `queueSystem/${type}/totalIssued`);
            runTransaction(totalRef, (current) => { return (current || 0) + 1; }).then((result) => {
                if (result.committed) {
                    const num = result.snapshot.val();
                    const formattedNum = type + String(num).padStart(3, '0');
                    set(myNodeRef, { status: "waiting", ticketNumber: formattedNum, guestsCount: guests });
                }
            });
        };

        // 🔥 毫秒級精準對齊倒數計時
        function startSynchronizedClock(serverStartTime) {
            clearInterval(timerInterval);
            const totalSec = 90 * 60;

            timerInterval = setInterval(() => {
                // 利用 serverOffset 計算出當前的絕對雲端標準時間
                const estimatedServerNow = Date.now() + serverOffset;
                const elapsedSec = Math.floor((estimatedServerNow - serverStartTime) / 1000);
                const remain = totalSec - elapsedSec;

                if (remain <= 0) {
                    clearInterval(timerInterval);
                    set(myNodeRef, null);
                } else {
                    const m = Math.floor(remain / 60);
                    const s = remain % 60;
                    document.getElementById('timerDisplay').innerText = String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                }
            }, 1000);
        }

        function showThanksPage() {
            document.getElementById('mainCard').style.display = 'none';
            document.getElementById('thanksPhase').style.display = 'block';
            setTimeout(() => { window.location.reload(); }, 10000);
        }
    </script>
</body>
</html>

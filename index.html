<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能叫號系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        /* 三欄佈局 */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 400px;
        }

        .card-title {
            font-size: 1.5rem;
            color: #4a5568;
            margin-bottom: 20px;
            border-bottom: 3px solid #3182ce;
            padding-bottom: 5px;
            width: 100%;
            text-align: center;
        }

        /* 通用按鈕樣式 */
        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            width: 80%;
            margin: 10px 0;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 客人排隊區 */
        .btn-ticket {
            background-color: #3182ce;
            color: white;
            height: 80px;
            font-size: 1.5rem;
        }
        .btn-ticket:hover { background-color: #2b6cb0; }
        
        .ticket-display {
            margin-top: 30px;
            text-align: center;
            font-size: 1.2rem;
            color: #4a5568;
        }
        .ticket-num {
            font-size: 3rem;
            font-weight: bold;
            color: #2b6cb0;
        }

        /* 叫號屏幕區 */
        .screen-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .current-label {
            font-size: 1.3rem;
            color: #e53e3e;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .current-number {
            font-size: 6rem;
            font-weight: bold;
            color: #e53e3e;
            margin: 10px 0;
            animation: blink 1s infinite alternate;
        }
        @keyframes blink {
            0% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        /* 店員叫號區 */
        .btn-next {
            background-color: #38a169;
            color: white;
            height: 60px;
        }
        .btn-next:hover { background-color: #2f855a; }

        .btn-recall {
            background-color: #dd6b20;
            color: white;
        }
        .btn-recall:hover { background-color: #c05621; }

        .btn-reset {
            background-color: #e53e3e;
            color: white;
            margin-top: auto;
            width: 50%;
            font-size: 0.9rem;
            padding: 8px;
        }
        .btn-reset:hover { background-color: #c53030; }

        .stats {
            margin-top: 15px;
            font-size: 1rem;
            color: #718096;
            text-align: left;
            width: 80%;
        }
    </style>
</head>
<body>

    <h1>🏪 智能叫號系統</h1>

    <div class="container">

        <div class="card">
            <div class="card-title">1. 客人排隊機</div>
            <p style="color: #718096; margin-bottom: 20px; text-align: center;">請點擊下方按鈕取號</p>
            <button class="btn-ticket" onclick="takeTicket()">按此取號</button>
            <div class="ticket-display" id="ticketDisplay" style="display: none;">
                您的號碼是：<br>
                <span class="ticket-num" id="myNumber">0</span>
            </div>
        </div>

        <div class="card" style="background-color: #fffaf0; border: 2px solid #feebc8;">
            <div class="card-title" style="border-bottom-color: #dd6b20;">2. 電子叫號屏幕</div>
            <div class="screen-display">
                <div class="current-label">📢 請此號碼到櫃檯</div>
                <div class="current-number" id="screenNumber">--</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title" style="border-bottom-color: #38a169;">3. 店員控制面板</div>
            <button class="btn-next" onclick="nextNumber()">🔔 叫下一位</button>
            <button class="btn-recall" onclick="recallNumber()">🔄 重呼當前號碼</button>
            
            <div class="stats">
                <p>📊 目前排隊總人數：<span id="totalTickets" style="font-weight:bold;">0</span></p>
                <p>⏳ 剩餘未叫人數：<span id="waitingCount" style="font-weight:bold; color:#3182ce;">0</span></p>
            </div>

            <button class="btn-reset" onclick="resetSystem()">重置系統</button>
        </div>

    </div>

    <script>
        // 初始化數據（嘗試從本地儲存讀取，若無則設為0）
        let currentCalled = parseInt(localStorage.getItem('currentCalled')) || 0;
        let totalIssued = parseInt(localStorage.getItem('totalIssued')) || 0;

        // 頁面載入時更新一次顯示
        updateDisplay();

        // 1. 客人取號
        function takeTicket() {
            totalIssued++;
            localStorage.setItem('totalIssued', totalIssued);
            
            // 顯示客人的號碼
            document.getElementById('ticketDisplay').style.display = 'block';
            document.getElementById('myNumber').innerText = totalIssued;
            
            updateDisplay();
        }

        // 3. 店員叫下一位
        function nextNumber() {
            if (currentCalled < totalIssued) {
                currentCalled++;
                localStorage.setItem('currentCalled', currentCalled);
                updateDisplay();
                speakNumber(currentCalled);
            } else {
                alert("目前沒有客人在排隊喔！");
            }
        }

        // 3. 店員重呼
        function recallNumber() {
            if (currentCalled > 0) {
                speakNumber(currentCalled);
            } else {
                alert("尚未開始叫號！");
            }
        }

        // 更新所有屏幕和數據顯示
        function updateDisplay() {
            // 更新叫號屏幕
            document.getElementById('screenNumber').innerText = currentCalled > 0 ? currentCalled : "--";
            // 更新店員面板數據
            document.getElementById('totalTickets').innerText = totalIssued;
            
            let waiting = totalIssued - currentCalled;
            document.getElementById('waitingCount').innerText = waiting >= 0 ? waiting : 0;
        }

        // 語音播報功能（自動識別廣東話/華語，這裡預設廣東話）
        function speakNumber(num) {
            if ('speechSynthesis' in window) {
                // 先停止之前正在播報的聲音
                window.speechSynthesis.cancel();
                
                let text = `請 ${num} 號到櫃檯`;
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK'; // 廣東話發音 (如需普通話可改為 zh-CN)
                utterance.rate = 0.9;     // 語速稍微減慢一點
                window.speechSynthesis.speak(utterance);
            }
        }

        // 重置系統
        function resetSystem() {
            if (confirm("確定要將所有號碼清零重置嗎？")) {
                currentCalled = 0;
                totalIssued = 0;
                localStorage.clear();
                document.getElementById('ticketDisplay').style.display = 'none';
                updateDisplay();
            }
        }
    </script>
</body>
</html>
